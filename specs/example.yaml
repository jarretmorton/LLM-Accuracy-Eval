# Example eval spec for llm-accuracy-eval.
#
# This spec reproduces a slice of the sports-league experiment from the
# LessWrong post the harness is built around. Run it with:
#
#   llm-accuracy-eval run specs/example.yaml
#
# The spec is intentionally small. The goal is to demonstrate the format,
# not to reproduce the full 640-query result.

name: example-sports-leagues

description: >
  Two sports-league topics, two models, twenty runs each. Each topic includes
  a coverage_check (secondary question with web search disabled) that must
  pass before the primary stability measurement is trusted.

# Models to run against. Strings are passed verbatim to the provider.
models:
  - claude-haiku-4-5
  - claude-opus-4-7

# Number of times to run each primary query, per model, per topic.
runs: 20

# Sampling temperature. 1.0 matches claude.ai's apparent default (per
# third-party measurement), the platform used in the original LessWrong study.
# 0 trivialises stability and is rejected.
temperature: 1.0

# Grader: exact | numeric | judge | none.
#   exact   — string equality with ground_truth (case-insensitive, whitespace-trimmed).
#   numeric — regex extraction with unit awareness; accuracy = 1 - |x - truth| / truth.
#   judge   — LLM-as-judge call; requires judge_model.
#   none    — measure stability only; do not compute accuracy.
grader: numeric

topics:
  - name: nhl-2023-playing-time
    primary_query: >
      What was the total playing time in hours for the National Hockey League
      in the season ending in 2023? Include post season playoffs, but don't
      include any overtime.
    coverage_check:
      query: >
        Do not search the internet for this answer (use only your training). What was the final game winning score for the National Hockey League in the season ending in 2023?
      # If the response contains any of these patterns, the model is
      # treated as outside training coverage for this topic and the
      # primary query is skipped.
      refusal_patterns:
        - "I cannot"
        - "I don't have"
        - "without access"
        - "can't verify"
    ground_truth: 1400

  - name: mlb-2023-playing-time
    primary_query: >
      What was the total playing time in hours for Major League Baseball
      in the season ending in 2023? Include post season playoffs, but don't
      include any overtime.
    coverage_check:
      query: >
        Do not search the internet for this answer (use only your training). What was the final game winning score for the Major League Baseball in the season ending in 2023?
      refusal_patterns:
        - "I cannot"
        - "I don't have"
        - "without access"
        - "can't verify"
    ground_truth: 6589.33

# Output destination. JSON, one file per eval session.
output:
  path: results/example.json
  format: json